name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: 222hustler
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Brussels
          config_order: base.header, isocalendar, languages, habits, repositories

          # Calendrier 3D isométrique — exactement comme lui
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Langages
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_details: percentage, bytes-size
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes

          # Habitudes de commits (par heure, par jour)
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes

          # Topics / technologies
          plugin_topics: yes
          plugin_topics_mode: mastered
          plugin_topics_limit: 0

          # Achievements
          plugin_achievements: yes
          plugin_achievements_threshold: B
